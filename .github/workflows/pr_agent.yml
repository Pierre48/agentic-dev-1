name: Agentic PR Review & Code Suggestions (Gemini)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
      
    steps:
      - name: PR Agent Action Step
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Models Configuration
          config.model: "gemini/gemini-1.5-flash"
          config.fallback_models: '["gemini/gemini-1.5-flash"]'
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # --- Core Automation Triggers ---
          github_action_config.auto_describe: "true" # Summary & Title
          github_action_config.auto_review: "true"    # Security, bugs, & architectural checks
          github_action_config.auto_improve: "true"   # AI Proposes code modifications automatically
          
          # --- Code Proposal Formatting ---
          # Formats suggestions into native GitHub multi-line code blocks 
          # so humans can commit them directly via UI buttons.
          pr_code_suggestions.commitable_code_suggestions: "true"
          pr_code_suggestions.num_code_suggestions_per_chunk: "4"