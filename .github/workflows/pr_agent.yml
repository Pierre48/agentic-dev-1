name: Agentic PR & Issue Automation (Gemini)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  issues:
    types: [opened] # Triggers when a new issue is created

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write # Crucial for allowing the agent to create fix branches
      
    steps:
      - name: PR Agent Action Step
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Models Configuration
          config.model: "gemini/gemini-3.5-flash"
          config.fallback_models: '["gemini/gemini-3.5-flash"]'
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # --- PR Automation Triggers ---
          github_action_config.auto_describe: "true"
          github_action_config.auto_review: "true"
          github_action_config.auto_improve: "true"
          pr_code_suggestions.commitable_code_suggestions: "true"
          
          # --- Issue Code Proposal Automation ---
          # This instructs the agent to automatically run when an issue opens
          github_action_config.auto_improve_by_issue: "true"

          # Maps the runtime command when an Issue opens instead of a PR
          # PR-Agent can look at an issue if explicitly called with /generate_labels or basic commands
          CUSTOM_COMMAND: ${{ github.event_name == 'issues' && '/review' || '' }}